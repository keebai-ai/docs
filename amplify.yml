version: 1
frontend:
  phases:
    build:
      commands:
        - "[ -f export.zip ] && rm export.zip || true"
        - "mkdir -p amplify-dist"
        - "find amplify-dist -mindepth 1 -delete"
        - "export NODE_ENV=production"
        - "NODE_ENV=production npx --yes mintlify validate"
        - "NODE_ENV=production npx --yes mintlify export --output export.zip"
        - "unzip -oq export.zip -d amplify-dist"
  artifacts:
    baseDirectory: amplify-dist
    files:
      - '**/*'
  cache:
    paths:
      - /root/.npm/**/*
